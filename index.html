<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --paper: #f4ecd6;
        --paper-shadow: #e7dcc0;
        --paper-line: rgba(119, 90, 44, 0.12);
        --paper-margin: rgba(145, 76, 52, 0.18);
        --ink: #2b2215;
        --ink-soft: #5e503f;
        --accent: #6c5c2f;
        --accent-strong: #4f431f;
        --accent-wash: rgba(108, 92, 47, 0.12);
        --field-note: #ede4c8;
        --warning-bg: #f4dfbf;
        --warning-border: #c08c40;
        --warning-ink: #6a4a15;
        --danger-bg: #f4d8cf;
        --danger-border: #b87062;
        --danger-ink: #7a2f26;
        --table-rule: rgba(67, 49, 24, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Libre Baskerville", Georgia, serif;
        line-height: 1.5;
        background:
          linear-gradient(90deg, transparent 0 78px, var(--paper-margin) 78px 80px, transparent 80px),
          repeating-linear-gradient(
            180deg,
            transparent 0 31px,
            var(--paper-line) 31px 32px
          ),
          linear-gradient(180deg, #efe5cb 0%, var(--paper) 100%);
        color: var(--ink);
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 48px 104px;
        min-height: 100vh;
      }

      h1,
      h2 {
        margin-top: 0;
        font-family: "Caveat", "Brush Script MT", cursive;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--ink);
      }

      h1 {
        font-size: clamp(2.5rem, 5vw, 4rem);
        margin-bottom: 12px;
      }

      h2 {
        font-size: clamp(1.9rem, 4vw, 2.6rem);
      }

      .query-form label,
      .results-notice,
      .request-status,
      .loading-label,
      .location-status,
      .dataTables_wrapper .dataTables_filter label,
      .dataTables_wrapper .dataTables_length label,
      .dataTables_wrapper .dataTables_info,
      .dataTables_wrapper .dataTables_paginate,
      .dataTables_wrapper .dataTables_filter,
      .dataTables_wrapper .dataTables_length {
        font-family: "Caveat", "Brush Script MT", cursive;
        letter-spacing: 0.02em;
      }

      .query-form {
        display: grid;
        gap: 12px;
        max-width: 420px;
        background: rgba(255, 250, 239, 0.58);
        border: 1px solid rgba(84, 64, 37, 0.12);
        border-radius: 18px;
        padding: 18px 18px 16px;
        box-shadow: 0 12px 28px rgba(87, 69, 34, 0.08);
      }

      .query-form-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: stretch;
      }

      .query-form label {
        font-weight: 600;
        font-size: 1.5rem;
      }

      .query-form input,
      .query-form button {
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        font-size: 16px;
        border-radius: 8px;
      }

      .query-form input {
        border: 1px solid rgba(76, 58, 31, 0.22);
        background: rgba(255, 251, 243, 0.92);
        color: var(--ink);
        box-shadow: inset 0 -1px 0 rgba(76, 58, 31, 0.08);
      }

      .query-form button {
        border: 1px solid rgba(79, 67, 31, 0.16);
        background: linear-gradient(180deg, #857448 0%, #66572d 100%);
        color: #f9f3e2;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(67, 49, 24, 0.16);
      }

      .query-form button.secondary-button {
        background: rgba(234, 222, 191, 0.92);
        color: var(--accent-strong);
        border: 1px solid rgba(108, 92, 47, 0.22);
      }

      .query-form button:hover,
      .query-form button:focus {
        background: linear-gradient(180deg, #726337 0%, #594b25 100%);
      }

      .query-form button.secondary-button:hover,
      .query-form button.secondary-button:focus {
        background: #e6d8b5;
      }

      .query-form button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .location-status {
        min-height: 1.5em;
        margin: 0;
        color: var(--ink-soft);
        font-size: 14px;
      }

      .loading-indicator {
        display: none;
        margin: 8px 0 20px;
      }

      .loading-indicator.active {
        display: block;
      }

      .loading-label {
        margin: 0 0 8px;
        color: var(--ink-soft);
        font-size: 14px;
      }

      .loading-bar {
        position: relative;
        width: 100%;
        max-width: 420px;
        height: 10px;
        overflow: hidden;
        background: rgba(111, 93, 54, 0.16);
        border-radius: 999px;
      }

      .loading-bar::after {
        content: "";
        position: absolute;
        inset: 0 auto 0 -40%;
        width: 40%;
        background: linear-gradient(90deg, #7c6236, #b18b52);
        border-radius: inherit;
        animation: loading-slide 1.1s ease-in-out infinite;
      }

      @keyframes loading-slide {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(350%);
        }
      }

      .request-status {
        display: none;
        margin: 0 0 16px;
        padding: 12px 14px;
        max-width: 420px;
        border-radius: 8px;
        border: 1px solid var(--danger-border);
        background: var(--danger-bg);
        color: var(--danger-ink);
      }

      .request-status.active {
        display: block;
      }

      .results-notice {
        display: none;
        margin: 0 0 16px;
        padding: 12px 14px;
        max-width: 420px;
        border-radius: 8px;
        border: 1px solid rgba(108, 92, 47, 0.2);
        background: var(--field-note);
        color: var(--accent-strong);
      }

      .results-notice.active {
        display: block;
      }

      .results-notice.warning {
        border-color: var(--warning-border);
        background: var(--warning-bg);
        color: var(--warning-ink);
      }

      #play-random {
        display: inline-block;
        margin: 8px 0 20px;
        color: var(--accent-strong);
        font-family: "Caveat", "Brush Script MT", cursive;
        font-size: 1.45rem;
      }

      #results {
        width: 100%;
      }

      .results-section {
        margin-top: 24px;
        background: rgba(255, 251, 241, 0.64);
        border: 1px solid rgba(84, 64, 37, 0.1);
        border-radius: 18px;
        padding: 18px 20px 16px;
        box-shadow: 0 10px 24px rgba(87, 69, 34, 0.06);
      }

      .results-table {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .dataTables_wrapper {
        width: 100%;
        overflow-x: auto;
      }

      table.dataTable thead th,
      table.dataTable tbody td {
        border-bottom: 1px solid var(--table-rule) !important;
      }

      table.dataTable thead th {
        font-family: "Caveat", "Brush Script MT", cursive;
        font-size: 1.35rem;
        color: var(--ink);
        background: rgba(232, 220, 187, 0.6);
      }

      table.dataTable tbody td {
        background: transparent !important;
        color: var(--ink);
      }

      table.dataTable.stripe tbody tr.odd,
      table.dataTable.display tbody tr.odd {
        background: rgba(255, 252, 244, 0.52);
      }

      table.dataTable.hover tbody tr:hover,
      table.dataTable.display tbody tr:hover {
        background: rgba(108, 92, 47, 0.08);
      }

      table.dataTable {
        width: 100% !important;
      }

      .grid-column-cell {
        text-align: center;
        vertical-align: middle;
        min-width: 48px;
        padding-left: 6px;
        padding-right: 6px;
      }

      .pentad-grid-svg {
        display: block;
        width: 34px;
        height: 34px;
        margin: 0 auto;
      }

      .grid-toggle-button {
        position: relative;
        display: inline-block;
        width: 42px;
        height: 34px;
        padding: 0;
        border: none;
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        vertical-align: middle;
      }

      .grid-toggle-button:hover,
      .grid-toggle-button:focus {
        background: var(--accent-wash);
        outline: none;
      }

      .grid-toggle-graphic,
      .grid-toggle-rate {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      .grid-toggle-rate {
        font-size: 13px;
        font-weight: 600;
        color: inherit;
        line-height: 1;
        white-space: nowrap;
      }

      .grid-toggle-graphic[hidden],
      .grid-toggle-rate[hidden] {
        display: none !important;
      }

      .listen-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        text-decoration: none;
        font-size: 18px;
        line-height: 1;
      }

      .listen-button-icon {
        width: 18px;
        height: 18px;
        color: var(--accent-strong);
      }

      .listen-button:hover,
      .listen-button:focus {
        background: var(--accent-wash);
        outline: none;
      }

      .dataTables_wrapper .dataTables_filter,
      .dataTables_wrapper .dataTables_info,
      .dataTables_wrapper .dataTables_paginate,
      .dataTables_wrapper .dataTables_length {
        margin-top: 8px;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgb(0,0,0);
        background-color: rgba(0,0,0,0.4);
      }
    
      .modal-content {
        background: linear-gradient(180deg, #fffaf0 0%, #f3ead5 100%);
        margin: 48px auto;
        padding: 20px;
        border: 1px solid rgba(84, 64, 37, 0.18);
        width: min(92vw, 680px);
        max-height: calc(100vh - 96px);
        overflow-y: auto;
        border-radius: 12px;
        color: var(--ink);
      }
    
      .close {
        color: var(--ink-soft);
        float: right;
        font-size: 28px;
        font-weight: bold;
      }
    
      .close:hover,
      .close:focus {
        color: var(--ink);
        text-decoration: none;
        cursor: pointer;
      }

      #audioPlayer {
        width: 100%;
      }

      @media (max-width: 640px) {
        .page {
          padding: 18px 12px 32px 48px;
        }

        body {
          background:
            linear-gradient(90deg, transparent 0 28px, var(--paper-margin) 28px 30px, transparent 30px),
            repeating-linear-gradient(
              180deg,
              transparent 0 31px,
              var(--paper-line) 31px 32px
            ),
            linear-gradient(180deg, #efe5cb 0%, var(--paper) 100%);
        }

        .query-form-row {
          grid-template-columns: 1fr;
        }

        .modal-content {
          margin: 16px auto;
          max-height: calc(100vh - 32px);
          padding: 16px;
        }

        .dataTables_wrapper .dataTables_filter label,
        .dataTables_wrapper .dataTables_length label {
          display: block;
        }

        .dataTables_wrapper .dataTables_filter input,
        .dataTables_wrapper .dataTables_length select {
          width: 100%;
          margin-left: 0;
          margin-top: 6px;
        }

        h1 {
          font-size: 2.55rem;
        }

        h2 {
          font-size: 2rem;
        }

        .results-section {
          padding: 16px 14px 14px;
        }
      }

    <script type="text/javascript">
      const PENTAD_CACHE_VERSION = 'v7';
      const PENTAD_CACHE_PREFIX = `pentad-results:${PENTAD_CACHE_VERSION}:`;
      const PENTAD_CACHE_TTL_MS = 5 * 24 * 60 * 60 * 1000;

      function getCacheKey(pentadCode) {
        return PENTAD_CACHE_PREFIX + pentadCode;
      }

      function readCachedResults(pentadCode) {
        try {
          const rawValue = localStorage.getItem(getCacheKey(pentadCode));
          if (!rawValue) {
            return null;
          }

          const cached = JSON.parse(rawValue);
          if (!cached || !cached.html || !cached.cachedAt) {
            localStorage.removeItem(getCacheKey(pentadCode));
            return null;
          }

          if (Date.now() - cached.cachedAt > PENTAD_CACHE_TTL_MS) {
            localStorage.removeItem(getCacheKey(pentadCode));
            return null;
          }

          return cached;
        } catch (error) {
          return null;
        }
      }

      function writeCachedResults(pentadCode, html) {
        try {
          localStorage.setItem(
            getCacheKey(pentadCode),
            JSON.stringify({
              html: html,
              cachedAt: Date.now()
            })
          );
        } catch (error) {
          console.warn('Could not cache pentad results locally.', error);
        }
      }

      function clearCachedResults(pentadCode) {
        try {
          localStorage.removeItem(getCacheKey(pentadCode));
        } catch (error) {
          console.warn('Could not clear cached pentad results.', error);
        }
      }

      function updatePentadUrl(pentadCode) {
        const url = new URL(window.location.href);
        if (pentadCode) {
          url.searchParams.set('pentadCode', pentadCode);
        } else {
          url.searchParams.delete('pentadCode');
        }
        window.history.pushState({}, '', url);
      }

      function getPentadCodeFromUrl() {
        const url = new URL(window.location.href);
        return url.searchParams.get('pentadCode') || '';
      }

      function initializeResultsTables() {
        $('#species-table').DataTable({
            "order": [[ 2, "desc" ]],
            "paging": false,
            "scrollX": true,
            "autoWidth": false,
            columnDefs: [
                { width: '58%', targets: 0 },
                { width: '16%', targets: 1, orderable: false },
                { width: '26%', targets: 2, className: 'grid-column-cell' }
            ],
        });

        $('#possible-species').DataTable({
            "order": [[ 2, "desc" ]],
            "paging": false,
            "scrollX": true,
            "autoWidth": false,
            columnDefs: [
                { width: '58%', targets: 0 },
                { width: '16%', targets: 1, orderable: false },
                { width: '26%', targets: 2, className: 'grid-column-cell' }
            ],
        });
      }

      function setResultsNotice(message, tone, options) {
        const opts = options || {};
        const resultsNotice = document.getElementById('results-notice');
        resultsNotice.innerHTML = '';
        resultsNotice.classList.remove('active', 'warning');

        if (!message) {
          return;
        }

        const messageSpan = document.createElement('span');
        messageSpan.textContent = message;
        resultsNotice.appendChild(messageSpan);

        if (opts.showRefetch) {
          resultsNotice.appendChild(document.createTextNode(' '));
          const refetchLink = document.createElement('a');
          refetchLink.href = '#';
          refetchLink.textContent = 'Re-fetch';
          refetchLink.onclick = function () {
            callResults({ forceRefresh: true });
            return false;
          };
          resultsNotice.appendChild(refetchLink);
        }

        resultsNotice.classList.add('active');
        if (tone === 'warning') {
          resultsNotice.classList.add('warning');
        }
      }

      function renderResults(html, options) {
        const opts = options || {};
        const results = document.getElementById('results');
        results.innerHTML = html;
        initializeResultsTables();
        document.getElementById("play-random").style.display = "block";

        if (opts.fromCache) {
          const cachedAt = new Date(opts.cachedAt);
          setResultsNotice(
            `Showing cached results from ${cachedAt.toLocaleDateString()}.`,
            'info',
            { showRefetch: true }
          );
          return;
        }

        if (opts.partial) {
          const count = opts.adjacentFailures || 0;
          const noun = count === 1 ? 'pentad request' : 'pentad requests';
          setResultsNotice(
            `Results loaded, but ${count} adjacent ${noun} failed or timed out. These partial results were not cached.`,
            'warning'
          );
          return;
        }

        setResultsNotice('Results loaded and cached locally for 5 days.', 'info');
      }

      function callResults(options) {
        const opts = options || {};
        // Get the pentad code value from the form
        var pentadCode = document.getElementById('pentadCode').value.trim();
        const loadingIndicator = document.getElementById('loading-indicator');
        const requestStatus = document.getElementById('request-status');
        const submitButton = document.getElementById('submit-button');
        const results = document.getElementById('results');
        // Make a GET request to the /results endpoint with the pentad code as a query parameter
        var xhr = new XMLHttpRequest();

        document.getElementById('pentadCode').value = pentadCode;

        function showRequestFailure(message) {
          loadingIndicator.classList.remove('active');
          submitButton.disabled = false;
          requestStatus.textContent = message;
          requestStatus.classList.add('active');
          setResultsNotice('');
          results.innerHTML = '';
        }

        if (opts.updateHistory !== false) {
          updatePentadUrl(pentadCode);
        }

        if (opts.forceRefresh) {
          clearCachedResults(pentadCode);
        }

        const cachedResults = opts.forceRefresh ? null : readCachedResults(pentadCode);
        if (cachedResults) {
          requestStatus.textContent = '';
          requestStatus.classList.remove('active');
          loadingIndicator.classList.remove('active');
          submitButton.disabled = false;
          renderResults(cachedResults.html, {
            fromCache: true,
            cachedAt: cachedResults.cachedAt
          });
          return;
        }

        loadingIndicator.classList.add('active');
        submitButton.disabled = true;
        requestStatus.textContent = '';
        requestStatus.classList.remove('active');
        setResultsNotice('');
        results.innerHTML = '';
        document.getElementById("play-random").style.display = "none";
        xhr.timeout = 25000;
        xhr.open('GET', '/.netlify/functions/app/results?pentadCode=' + pentadCode, true);
        xhr.onreadystatechange = function () {
          // When the request is successful, display the returned html in the page
          if (this.readyState === 4 && this.status === 200) {
            loadingIndicator.classList.remove('active');
            submitButton.disabled = false;
            const isComplete = this.getResponseHeader('X-Pentad-Results-Complete') === 'true';
            const adjacentFailures = parseInt(this.getResponseHeader('X-Pentad-Adjacent-Failures') || '0', 10);

            if (isComplete) {
              writeCachedResults(pentadCode, this.responseText);
            } else {
              clearCachedResults(pentadCode);
            }

            renderResults(this.responseText, {
              partial: !isComplete,
              adjacentFailures: adjacentFailures
            });
          } else if (this.readyState === 4) {
            showRequestFailure(this.responseText || 'Fetching bird list failed. Please try again.');
          }
        };
        xhr.onerror = function () {
          showRequestFailure('Could not reach the pentad service. Please try again.');
        };
        xhr.ontimeout = function () {
          showRequestFailure('Fetching bird list timed out. Please try again.');
        };
        xhr.onabort = function () {
          showRequestFailure('Fetching bird list was interrupted. Please try again.');
        };
        xhr.send();
      }
    </script>
    <title>Pentad Code Query</title>
  </head>
  <body>
    <div class="page">
      <h1>Pentad Code Query</h1>
      <form class="query-form" onsubmit="callResults(); return false;">
        <label for="pentadCode">Enter pentad code:</label>
        <div class="query-form-row">
          <input type="text" id="pentadCode" name="pentadCode" placeholder="2525_2815">
          <button type="button" class="secondary-button" id="use-location" onclick="useCurrentLocation()">Use current location</button>
        </div>
        <p class="location-status" id="location-status" aria-live="polite"></p>
        <button type="submit" id="submit-button">Submit</button>
      </form>
      <div class="loading-indicator" id="loading-indicator" aria-live="polite" aria-hidden="true">
        <p class="loading-label">Fetching pentad lists...</p>
        <div class="loading-bar"></div>
      </div>
      <div class="request-status" id="request-status" role="alert"></div>
      <div class="results-notice" id="results-notice" aria-live="polite"></div>
      <a href="#" onclick="playRandom(); return false;" id="play-random" style="display:none;">Learn calls</a>
      <div id="results"></div>
      <div id="myModal" class="modal">
        <div class="modal-content">
          <p>
            <span id="speciesDisplayName"></span> <br/>
            Call type: <span id="callType"></span> <br/>
            Country: <span id="cnt"></span> <br/>
            Location: <span id="loc"></span> <br/>
          </p>
          <span class="close">&times;</span>
          <audio controls id="audioPlayer">
            <source src="" type="audio/mpeg">
          </audio>
          <span><a href="#" onclick="playSingle(); return false;" style="display: none" id="play-single">Play single call only</a></span>
        </div>
      </div>
    </div>
    <script>
      const modal = document.getElementById("myModal");
      const audioPlayer = document.getElementById("audioPlayer");
      const close = document.getElementsByClassName("close")[0];
      const pentadCodeInput = document.getElementById("pentadCode");
      const useLocationButton = document.getElementById("use-location");
      const locationStatus = document.getElementById("location-status");
      let mode = "single";

      function zeroPad(value, length) {
        return String(value).padStart(length, "0");
      }

      function getPentadCode(latitude, longitude) {
        const latAbs = Math.abs(latitude);
        const lonAbs = Math.abs(longitude);
        const latDeg = Math.floor(latAbs);
        const lonDeg = Math.floor(lonAbs);
        const latMinTotal = (latAbs - latDeg) * 60;
        const lonMinTotal = (lonAbs - lonDeg) * 60;
        const latMin = Math.floor(latMinTotal / 5) * 5;
        const lonMin = Math.floor(lonMinTotal / 5) * 5;
        const latPart = zeroPad(latDeg, 2) + zeroPad(latMin, 2);
        const lonPart = zeroPad(lonDeg, 2) + zeroPad(lonMin, 2);
        return `${latPart}_${lonPart}`;
      }

      function setLocationStatus(message) {
        locationStatus.textContent = message;
      }

      function useCurrentLocation() {
        if (!navigator.geolocation) {
          setLocationStatus("Location is not supported by this browser.");
          return;
        }

        useLocationButton.disabled = true;
        setLocationStatus("Getting your current location...");

        navigator.geolocation.getCurrentPosition(
          function (position) {
            const pentadCode = getPentadCode(
              position.coords.latitude,
              position.coords.longitude
            );
            pentadCodeInput.value = pentadCode;
            useLocationButton.disabled = false;
            setLocationStatus(`Pentad code set to ${pentadCode}.`);
          },
          function (error) {
            useLocationButton.disabled = false;

            if (error.code === error.PERMISSION_DENIED) {
              setLocationStatus("Location access was denied.");
              return;
            }

            if (error.code === error.POSITION_UNAVAILABLE) {
              setLocationStatus("Current location is unavailable.");
              return;
            }

            if (error.code === error.TIMEOUT) {
              setLocationStatus("Timed out while getting your location.");
              return;
            }

            setLocationStatus("Could not determine your current location.");
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 300000
          }
        );
      }
    
      async function playCall(speciesName, commonName) {
        let apiCall = `/.netlify/functions/app/call?speciesName=${encodeURIComponent(speciesName)}&commonName=${encodeURIComponent(commonName)}`;

        try {
          const response = await fetch(apiCall);
          const json = await response.json();

          if (!response.ok || !json.file) {
            throw new Error(json.error || "Could not load a bird call.");
          }

          document.getElementById("speciesDisplayName").innerHTML = `<strong>${commonName}</strong> (${speciesName})`;
          document.getElementById("callType").innerHTML = json.type;
          document.getElementById("cnt").innerHTML = json.country;
          document.getElementById("loc").innerHTML = json.location;
          audioPlayer.src = json.file;
          modal.style.display = "block";
          audioPlayer.play();
          if (mode === "random") {
            audioPlayer.addEventListener("ended", playRandom);
          }
        } catch (error) {
          alert(error.message || "Could not load a bird call.");
        }
      }

      function playRandom() {
        mode = "random";
        let tableRows = document.querySelectorAll('#species-table tbody tr');
        if (!tableRows.length) {
          alert("No species are available to play yet.");
          return;
        }
        let randomIndex = Math.floor(Math.random() * tableRows.length);
        let randomRow = tableRows[randomIndex];
        let link = randomRow.querySelector('a');
        document.getElementById("play-single").style.display = "block";
        link.click();
      }

      function playSingle() {
        mode = "single";
        audioPlayer.removeEventListener("ended", playRandom);
        document.getElementById("play-single").style.display = "none";
      }
    
      close.onclick = function() {
        modal.style.display = "none";
        audioPlayer.pause();
      }
    
      window.onclick = function(event) {
        if (event.target == modal) {
          modal.style.display = "none";
          audioPlayer.pause();
        }
      }

      document.getElementById('results').addEventListener('click', function (event) {
        const toggleButton = event.target.closest('.grid-toggle-button');
        if (!toggleButton) {
          return;
        }

        const isShowingRate = toggleButton.classList.toggle('showing-rate');
        const graphic = toggleButton.querySelector('.grid-toggle-graphic');
        const rate = toggleButton.querySelector('.grid-toggle-rate');

        if (graphic) {
          graphic.hidden = isShowingRate;
        }

        if (rate) {
          rate.hidden = !isShowingRate;
        }

        toggleButton.setAttribute('aria-pressed', String(isShowingRate));
      });

      const pentadCodeFromUrl = getPentadCodeFromUrl();
      if (pentadCodeFromUrl) {
        pentadCodeInput.value = pentadCodeFromUrl;
        callResults({ updateHistory: false });
      }
    </script>
  </body>
</html>
